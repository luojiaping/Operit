name: Android Build

on:
  workflow_dispatch:
    inputs:
      google_drive_folder:
        description: Public Google Drive folder URL containing dependency zip files
        required: false
        default: https://drive.google.com/drive/folders/1g-Q_i7cf6Ua4KX9ZM6V282EEZvTVVfF7
      gradle_task:
        description: Gradle task to run
        required: true
        default: assembleDebug

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-36" "build-tools;34.0.0" "ndk;25.1.8937393" "cmake;3.22.1"
          yes | sdkmanager --licenses

      - name: Configure local properties
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OPERIT_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OPERIT_GITHUB_CLIENT_SECRET }}
        run: |
          cat > local.properties <<EOF
          GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
          EOF

      - name: Download manual dependencies
        run: |
          python3 -m pip install --user gdown
          mkdir -p manual-deps
          python3 -m gdown --folder "${{ inputs.google_drive_folder }}" --output manual-deps

      - name: Install manual dependencies
        run: |
          restore_zip() {
            local name="$1"
            if [ -f "manual-deps/${name}" ]; then
              return
            fi

            if ls "manual-deps/${name}".* >/dev/null 2>&1; then
              cat "manual-deps/${name}".* > "manual-deps/${name}"
              return
            fi

            echo "Missing ${name} or split parts named ${name}.001, ${name}.002, ..."
            exit 1
          }

          restore_zip models.zip
          restore_zip subpack.zip
          restore_zip jniLibs.zip
          restore_zip libs.zip
          mkdir -p app/src/main/jniLibs app/libs

          unzip -qo manual-deps/models.zip
          unzip -qo manual-deps/subpack.zip
          unzip -qo manual-deps/jniLibs.zip
          unzip -qo manual-deps/libs.zip

      - name: Install root npm dependencies
        run: npm install

      - name: Install web-chat npm dependencies
        run: npm --prefix web-chat install

      - name: Build web-chat assets
        run: npm run build:webchat

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build example packages
        run: python3 ./sync_example_packages.py

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew ${{ inputs.gradle_task }} --stacktrace

      - name: Upload APK outputs
        uses: actions/upload-artifact@v4
        with:
          name: operit-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
